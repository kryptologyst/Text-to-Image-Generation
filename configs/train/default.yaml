# Training configuration
train:
  batch_size: 4
  learning_rate: 1e-4
  num_epochs: 100
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  
  # Optimizer
  optimizer:
    name: "AdamW"
    weight_decay: 0.01
    betas: [0.9, 0.999]
    
  # Scheduler
  scheduler:
    name: "cosine"
    warmup_steps: 1000
    
  # Mixed precision
  mixed_precision: "fp16"
  
  # Checkpointing
  save_every: 1000
  save_best: true
  max_checkpoints: 5
  
  # Logging
  log_every: 100
  log_images_every: 500
  
  # Validation
  val_every: 1000
  val_batch_size: 8
