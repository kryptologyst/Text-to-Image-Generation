# Evaluation configuration
eval:
  # Metrics to compute
  metrics:
    clip_score: true
    fid: true
    kid: true
    aesthetic_score: true
    diversity_score: true
    
  # CLIP model for evaluation
  clip_model: "openai/clip-vit-base-patch32"
  
  # FID/KID computation
  fid:
    batch_size: 50
    dims: 2048
    
  # Diversity metrics
  diversity:
    lpips: true
    ssim: true
    
  # Evaluation datasets
  datasets:
    - name: "coco_captions"
      path: "data/coco"
      split: "val"
    - name: "synthetic"
      path: "data/synthetic"
      split: "test"
      
  # Generation parameters for evaluation
  generation:
    num_samples: 1000
    num_inference_steps: 50
    guidance_scale: 7.5
    
  # Output
  save_results: true
  save_images: true
  results_dir: "assets/evaluation"
